<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>SysML v2 Browser IDE</title>
    <!-- Import Monaco Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --header-bg: #1a1a1a;
            --border-color: #2d2d2d;
            --text-color: #cccccc;
            --accent-color: #007acc;
            --error-color: #f48771;
            --success-color: #89d185;
            --info-color: #3794ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* IDE Layout */
        .ide-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* Header Navbar */
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ffffff;
        }

        /* Status Indicator */
        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-loading {
            background-color: rgba(235, 156, 49, 0.15);
            color: #eb9c31;
        }

        .status-loading::before {
            background-color: #eb9c31;
        }

        .status-ready {
            background-color: rgba(137, 209, 133, 0.15);
            color: var(--success-color);
        }

        .status-ready::before {
            background-color: var(--success-color);
        }

        /* Main Workspace Splitting */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100% - 50px);
            width: 100%;
        }

        .editor-pane {
            flex: 2;
            height: 100%;
            border-right: 1px solid var(--border-color);
        }

        #container {
            width: 100%;
            height: 100%;
        }

        /* Side Dashboard Panel */
        .dashboard-pane {
            flex: 1;
            min-width: 350px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            height: 100%;
        }

        /* Tab System */
        .tab-bar {
            display: flex;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            height: 35px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 12px;
            padding: 0 16px;
            cursor: pointer;
            height: 100%;
            border-right: 1px solid var(--border-color);
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: #ffffff;
        }

        .tab-btn.active {
            background-color: var(--panel-bg);
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        /* Tab Content Panes */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Problems List Styling */
        .problem-item {
            background-color: rgba(244, 135, 113, 0.05);
            border-left: 3px solid var(--error-color);
            padding: 10px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .problem-item:hover {
            background-color: rgba(244, 135, 113, 0.12);
        }

        .problem-meta {
            font-size: 11px;
            color: #888888;
            margin-bottom: 4px;
        }

        .problem-msg {
            font-size: 12px;
            color: #e5e5e5;
            font-family: monospace;
            word-break: break-all;
        }

        .no-problems {
            color: var(--success-color);
            text-align: center;
            font-size: 12px;
            margin-top: 40px;
        }

        /* Diagnostic Console Term Style */
        .log-console {
            background-color: #0d0d0d;
            border-radius: 4px;
            flex: 1;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 11px;
            padding: 10px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .log-in {
            color: var(--success-color);
        }

        .log-out {
            color: var(--info-color);
        }

        .log-sys {
            color: #888888;
        }
    </style>
</head>

<body>
    <div class="ide-container">
        <!-- Top Navbar -->
        <header>
            <div class="logo-section">
                <span class="logo-title">SysML v2 Browser IDE</span>
            </div>
            <div>
                <span id="statusBadge" class="status-badge status-loading">Initializing WASM...</span>
            </div>
        </header>

        <!-- Main Workspace Section -->
        <div class="workspace">
            <!-- Left Side: Monaco Editor Container -->
            <div class="editor-pane">
                <div id="container"></div>
            </div>

            <!-- Right Side: Dashboard Panel (Tabs) -->
            <div class="dashboard-pane">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('problems-tab', this)">Problems</button>
                    <button class="tab-btn" onclick="switchTab('logs-tab', this)">LSP Console Logs</button>
                </div>

                <!-- Problems Dashboard Content -->
                <div id="problems-tab" class="tab-content active">
                    <div id="problemsList">
                        <div class="no-problems">No syntax errors found. Your SysML v2 models look clean!</div>
                    </div>
                </div>

                <!-- Live Log Terminal Content -->
                <div id="logs-tab" class="tab-content">
                    <div class="log-console" id="logConsole">
                        <div class="log-line log-sys">[System] Dashboard initialized. Waiting for WASM compile loop...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Log helpers to write diagnostic output to the custom on-screen Terminal Tab
        const consoleEl = document.getElementById('logConsole');
        function logToConsole(message, direction = 'sys') {
            const line = document.createElement('div');
            line.className = `log-line log-${direction}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${direction === 'in' ? '↙ FROM RUST' : direction === 'out' ? '↗ TO RUST' : '⚙ SYSTEM'}: ${message}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Handles split dashboard tabs switching
        window.switchTab = function (tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        };

        console.log("%c[Main] Page loaded. Configuring Monaco loader...", "color: lime; font-weight: bold;");

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            console.log("%c[Main] Monaco core loaded! Creating Web Worker...", "color: lime; font-weight: bold;");

            // 1. Register the custom SysML v2 Language inside Monaco
            monaco.languages.register({ id: 'sysml' });

            // 2. Define Monarch Tokenizer for Syntax Highlighting
            monaco.languages.setMonarchTokensProvider('sysml', {
                keywords: [
                    'package', 'import', 'part', 'attribute', 'port', 'action', 'state',
                    'connection', 'item', 'def', 'ref', 'doc', 'metadata', 'individual',
                    'occurrence', 'structure', 'behavior', 'constraint', 'requirement',
                    'calculation', 'analysis', 'view', 'viewpoint', 'rendering', 'exhibit',
                    'perform', 'flow', 'interface', 'transition', 'as', 'by', 'to', 'from',
                    'public', 'private', 'scalar'
                ],
                tokenizer: {
                    root: [
                        [/[a-zA-Z_]\w*/, {
                            cases: {
                                '@keywords': 'keyword',
                                '@default': 'identifier'
                            }
                        }],
                        { include: '@whitespace' },
                        [/[{}()\[\]]/, 'delimiter.bracket'],
                        [/[;,.:]/, 'delimiter'],
                        [/"([^"\\]|\\.)*"/, 'string'],
                        [/\d+(\.\d+)?/, 'number'],
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, 'white'],
                        [/\/\*/, 'comment', '@comment'],
                        [/\/\/.*$/, 'comment'],
                    ],
                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\/\*/, 'comment', '@push'],
                        ["\\*/", 'comment', '@pop'],
                        [/[\/*]/, 'comment']
                    ],
                }
            });

            // Initialize the Web Worker
            const worker = new Worker('./lsp-worker.js', { type: 'module' });

            let requestId = 0;
            const pendingRequests = new Map();
            let editorInstance = null; // Global editor holder to navigate cursor via click events

            // Receive processed requests and notifications from Web Worker
            worker.onmessage = (event) => {
                const message = event.data;
                logToConsole(JSON.stringify(message), 'in');

                // Handle standard LSP publishDiagnostics notifications sent from Rust
                if (message.method === 'textDocument/publishDiagnostics') {
                    const { uri, diagnostics } = message.params;
                    const model = monaco.editor.getModel(monaco.Uri.parse(uri));
                    if (model) {
                        // Map Rust's parsed diagnostic data to Monaco markers
                        const markers = diagnostics.map(d => ({
                            severity: monaco.MarkerSeverity.Error,
                            message: d.message,
                            startLineNumber: d.range.start.line + 1,
                            startColumn: d.range.start.character + 1,
                            endLineNumber: d.range.end.line + 1,
                            endColumn: d.range.end.character + 1
                        }));

                        monaco.editor.setModelMarkers(model, 'wasm-lsp', markers);
                        updateProblemsDashboard(diagnostics);
                    }
                    return;
                }

                if (message.id !== undefined) {
                    const resolve = pendingRequests.get(message.id);
                    if (resolve) {
                        resolve(message.result);
                        pendingRequests.delete(message.id);
                    }
                }
            };

            // Programmatically builds and updates the interactive list in the Problems sidebar
            function updateProblemsDashboard(diagnostics) {
                const listEl = document.getElementById('problemsList');
                listEl.innerHTML = '';

                if (diagnostics.length === 0) {
                    listEl.innerHTML = '<div class="no-problems">No syntax errors found. Your SysML v2 models look clean!</div>';
                    return;
                }

                diagnostics.forEach(diag => {
                    const item = document.createElement('div');
                    item.className = 'problem-item';

                    const lineNum = diag.range.start.line + 1;
                    const colNum = diag.range.start.character + 1;

                    item.innerHTML = `
                        <div class="problem-meta">Line ${lineNum}, Column ${colNum}</div>
                        <div class="problem-msg">${diag.message}</div>
                    `;

                    // Focus the editor viewport exactly at the coordinates when clicked
                    item.addEventListener('click', () => {
                        if (editorInstance) {
                            editorInstance.setPosition({ lineNumber: lineNum, column: colNum });
                            editorInstance.revealPositionInCenter({ lineNumber: lineNum, column: colNum });
                            editorInstance.focus();
                        }
                    });

                    listEl.appendChild(item);
                });
            }

            // Dispatch helper
            function sendRequest(method, params) {
                return new Promise((resolve) => {
                    const id = requestId++;
                    pendingRequests.set(id, resolve);
                    const requestPayload = {
                        jsonrpc: '2.0',
                        id,
                        method,
                        params
                    };
                    logToConsole(JSON.stringify(requestPayload), 'out');
                    worker.postMessage(requestPayload);
                });
            }

            // Perform LSP initialization handshake on startup
            async function initLsp(model) {
                try {
                    logToConsole('Initiating standard LSP Handshake sequence...', 'sys');
                    const initResult = await sendRequest('initialize', {
                        processId: null,
                        rootUri: null,
                        capabilities: {},
                        workspaceFolders: null
                    });

                    // Update UI status badge once handshake responds
                    const badge = document.getElementById('statusBadge');
                    badge.textContent = 'LSP Ready';
                    badge.className = 'status-badge status-ready';

                    logToConsole('Handshake approved by Rust Language Server.', 'sys');

                    worker.postMessage({
                        jsonrpc: '2.0',
                        method: 'initialized',
                        params: {}
                    });

                    // Send didOpen notification so Rust receives the initial document state
                    worker.postMessage({
                        jsonrpc: '2.0',
                        method: 'textDocument/didOpen',
                        params: {
                            textDocument: {
                                uri: model.uri.toString(),
                                languageId: 'sysml',
                                version: model.getVersionId(),
                                text: model.getValue()
                            }
                        }
                    });

                } catch (error) {
                    console.error("[Main] LSP initialization handshake failed:", error);
                    const badge = document.getElementById('statusBadge');
                    badge.textContent = 'Error Loading WASM';
                    badge.style.backgroundColor = 'red';
                }
            }

            // Create Monaco Editor Instance with custom 'sysml' language
            const editor = monaco.editor.create(document.getElementById('container'), {
                value: 'package VehicleModel {\n\timport ScalarValues::*;\n\n\tpart def Vehicle;\n\n\tpart car : Vehicle {\n\t\tattribute mass : Real = 1500.0;\n\t\tperform action drive;\n\t}\n}',
                language: 'sysml',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 13,
                fontFamily: 'Consolas, "Courier New", monospace'
            });

            editorInstance = editor;
            const model = editor.getModel();

            // Run the handshake
            initLsp(model);

            // Send real-time didChange notifications as the user types
            model.onDidChangeContent(() => {
                worker.postMessage({
                    jsonrpc: '2.0',
                    method: 'textDocument/didChange',
                    params: {
                        textDocument: {
                            uri: model.uri.toString(),
                            version: model.getVersionId()
                        },
                        contentChanges: [
                            { text: model.getValue() }
                        ]
                    }
                });
            });

            // Register Hover Provider
            monaco.languages.registerHoverProvider('sysml', {
                provideHover: async (model, position) => {
                    const response = await sendRequest('textDocument/hover', {
                        textDocument: { uri: model.uri.toString() },
                        position: { line: position.lineNumber - 1, character: position.column - 1 }
                    });
                    if (!response) return null;
                    return {
                        range: new monaco.Range(position.lineNumber, 1, position.lineNumber, model.getLineMaxColumn(position.lineNumber)),
                        contents: [{ value: response.contents.value }]
                    };
                }
            });

            // Register Completion Provider
            monaco.languages.registerCompletionItemProvider('sysml', {
                triggerCharacters: [':', ';', '.'],
                provideCompletionItems: async (model, position) => {
                    const response = await sendRequest('textDocument/completion', {
                        textDocument: { uri: model.uri.toString() },
                        position: { line: position.lineNumber - 1, character: position.column - 1 }
                    });
                    if (!response) return { suggestions: [] };

                    const suggestions = response.map(item => ({
                        label: item.label,
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: item.insertText || item.label,
                        detail: item.detail,
                        range: {
                            startLineNumber: position.lineNumber,
                            endLineNumber: position.lineNumber,
                            startColumn: position.column - 1,
                            endColumn: position.column
                        }
                    }));
                    return { suggestions };
                }
            });
        });
    </script>
</body>

</html>
